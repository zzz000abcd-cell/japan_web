<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祇園文化探險家 | 日本文化測試</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 樣式與首頁相同 */
        :root {
            --primary-red: #dc3545;
            --primary-pink: #ff6b8b;
            --primary-blue: #3498db;
            --primary-green: #2ecc71;
            --primary-purple: #9b59b6;
            --dark-bg: #1a1a2e;
            --darker-bg: #16213e;
            --card-bg: rgba(30, 30, 60, 0.9);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: white;
            min-height: 100vh;
        }
        
        /* 導航欄 */
        .navbar {
            background: rgba(26, 26, 46, 0.95);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary-red);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-img {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-red), var(--primary-pink));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(220, 53, 69, 0.4);
        }
        
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-red), var(--primary-pink));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .nav-links {
            display: flex;
            gap: 30px;
        }
        
        .nav-link {
            color: #bdc3c7;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .nav-link:hover {
            color: white;
            background: rgba(220, 53, 69, 0.2);
        }
        
        .nav-link.active {
            color: white;
            background: linear-gradient(to right, var(--primary-red), var(--primary-pink));
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        
        /* 主容器 */
        .main-container {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 英雄區域 */
        .hero-section {
            text-align: center;
            margin-bottom: 60px;
            padding: 60px 40px;
            background: linear-gradient(145deg, 
                rgba(40, 40, 80, 0.7), 
                rgba(30, 30, 60, 0.7));
            border-radius: 25px;
            border: 2px solid rgba(220, 53, 69, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, 
                var(--primary-red), 
                var(--primary-pink),
                var(--primary-blue),
                var(--primary-green));
        }
        
        .hero-title {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(220, 53, 69, 0.5);
        }
        
        .hero-subtitle {
            font-size: 1.5rem;
            color: #bdc3c7;
            margin-bottom: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }
        
        .btn {
            padding: 15px 30px;
            border-radius: 25px;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }
        
        .btn-primary {
            background: linear-gradient(to right, var(--primary-red), var(--primary-pink));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(220, 53, 69, 0.4);
        }
        
        .btn-secondary {
            background: rgba(52, 152, 219, 0.2);
            color: white;
            border: 2px solid rgba(52, 152, 219, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(52, 152, 219, 0.4);
            transform: translateY(-5px);
        }
        
        /* 測驗容器 */
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(220, 53, 69, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .quiz-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(to right, var(--primary-red), var(--primary-pink));
        }
        
        .quiz-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 30px;
            color: white;
            position: relative;
            padding-bottom: 20px;
        }
        
        .quiz-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(to right, var(--primary-red), var(--primary-pink));
            border-radius: 2px;
        }
        
        .question {
            margin-bottom: 30px;
            font-size: 1.3rem;
            line-height: 1.6;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--primary-red);
        }
        
        .options {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .options li {
            background: rgba(255, 255, 255, 0.08);
            margin: 12px 0;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .options li:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            border-color: rgba(220, 53, 69, 0.3);
        }
        
        .options li.selected {
            background: linear-gradient(to right, var(--primary-green), #28a745);
            color: white;
            border-color: var(--primary-green);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.3);
        }
        
        .play-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            margin-left: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .play-icon:hover {
            background: rgba(220, 53, 69, 0.3);
            transform: scale(1.1);
        }
        
        #controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }
        
        button {
            padding: 15px 30px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(to right, var(--primary-red), var(--primary-pink));
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(220, 53, 69, 0.4);
        }
        
        button.secondary {
            background: rgba(52, 152, 219, 0.2);
            border: 2px solid rgba(52, 152, 219, 0.3);
        }
        
        button.secondary:hover {
            background: rgba(52, 152, 219, 0.4);
        }
        
        #progress {
            text-align: center;
            margin: 25px 0;
            color: #bdc3c7;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        #result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            text-align: center;
            font-size: 1.5rem;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .summary {
            margin-top: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .summary h2 {
            font-size: 2rem;
            margin-bottom: 25px;
            color: white;
            text-align: center;
            position: relative;
            padding-bottom: 15px;
        }
        
        .summary h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(to right, var(--primary-red), var(--primary-pink));
            border-radius: 2px;
        }
        
        .summary ul {
            list-style: none;
            padding: 0;
        }
        
        .summary li {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border-left: 4px solid var(--primary-blue);
        }
        
        .summary li.correct {
            border-left-color: var(--primary-green);
        }
        
        .summary li.incorrect {
            border-left-color: var(--primary-red);
        }
        
        /* 頁腳 */
        .footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid rgba(220, 53, 69, 0.2);
            color: #bdc3c7;
            margin-top: 60px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .footer-link {
            color: #bdc3c7;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-link:hover {
            color: white;
        }
        
        /* 響應式設計 */
        @media (max-width: 1024px) {
            .hero-title {
                font-size: 3rem;
            }
            
            .quiz-title {
                font-size: 2.2rem;
            }
        }
        
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            .hero-title {
                font-size: 2.2rem;
            }
            
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
            
            .main-container {
                padding: 20px;
            }
            
            .quiz-container {
                padding: 25px;
            }
            
            .quiz-title {
                font-size: 1.8rem;
            }
            
            #controls {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }
            
            .footer-links {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- 主內容 -->
    <div class="main-container">
        <!-- 英雄區域 -->
        <section class="hero-section">
            <h1 class="hero-title">日本文化測試</h1>
            <p class="hero-subtitle">
                測試您對日本文化的了解程度！本測驗包含10道題目，涵蓋日本傳統文化、節日、藝術、飲食等各個方面。
                每道題目都有日文發聲功能，幫助您學習正確的日文發音。
            </p>
            <p class="hero-subtitle">
                點擊選項即可選擇答案，完成所有題目後會顯示您的得分和詳細解答。準備好挑戰了嗎？
            </p>
        </section>

        <!-- 測驗區域 -->
        <div class="quiz-container">
            <h2 class="quiz-title">日本文化知識測驗</h2>
            <div id="quiz"></div>
            <div id="progress"></div>
            <div id="controls">
                <button id="submit">
                    <i class="fas fa-paper-plane"></i>
                    提交答案
                </button>
                <button id="restart" class="secondary" style="display:none;">
                    <i class="fas fa-home"></i>
                    返回首頁
                </button>
                <button id="replay" class="secondary">
                    <i class="fas fa-volume-up"></i>
                    重播題目語音
                </button>
            </div>
            <div id="result"></div>
            <div id="summary" class="summary"></div>
        </div>
    </div>

    <!-- 頁腳 -->
    <footer class="footer">
        <div class="footer-links">
            <a href="index.html" class="footer-link">首頁</a>
            <a href="vocabulary.html" class="footer-link">詞彙表</a>
            <a href="quiz.html" class="footer-link">日本文化測試</a>
            <a href="resources.html" class="footer-link">學習資源</a>
            <a href="gamification.html" class="footer-link">遊戲化學習</a>
            <a href="features.html" class="footer-link">平台特色</a>
        </div>
        <p style="margin-bottom: 20px; font-size: 1.1rem;">
            祇園文化探險家 | 遊戲化日文文化學習平台
        </p>
        <p style="color: #6c757d; font-size: 0.9rem;">
            © 2026 lai yu hin | 文化學習創新計畫 | 設計理念：將傳統流程轉化為沉浸式遊戲體驗
        </p>
    </footer>

    <script>
        // 題庫（中/日對照）
        const questions = [
            { question: "日本の首都はどこですか？ (日本的首都是？)", options: ["北京","ソウル","東京","バンコク"], answer:"東京" },
            { question: "ランタンや花火を灯す祭りはどれですか？ (點燈籠和煙花的節日是？)", options: ["花見","祭り","七夕","盂蘭盆節"], answer:"盂蘭盆節" },
            { question: "日本の伝統的な衣装は何ですか？ (日本傳統的服裝是？)", options: ["サリー","着物","韓服","旗袍"], answer:"着物" },
            { question: "発酵大豆から作られた有名な日本料理は何ですか？ (有名的日本料理是從發酵大豆製成的？)", options: ["味噌","壽司","麺類","天ぷら"], answer:"味噌" },
            { question: "景色や歌舞伎俳優のカラフルな版画で知られる芸術形式は何ですか？ (以多彩的風景和歌舞伎演員的版畫著稱的藝術形式是什麼？)", options: ["生け花","折り紙","浮世絵","書道"], answer:"浮世絵" },
            { question: "日本の有名な歌舞伎演目の一つは何ですか？ (日本著名的歌舞伎作品之一是什麼？)", options: ["三人吉三","西遊記","ハムレット","ロミオとジュリエット"], answer:"三人吉三" },
            { question: "日本の最も有名な山は何ですか？ (日本最著名的山是什麼？)", options: ["九州山","富士山","穂高岳","剣岳"], answer:"富士山" },
            { question: "日本の伝統的な茶道は何を重視しますか？ (日本的傳統茶道重視什麼？)", options: ["速さ","見た目","心","材料"], answer:"心" },
            { question: "寿司の基本的な材料は何ですか？ (壽司的基本材料是什麼？)", options: ["米","パン","麺","野菜"], answer:"米" },
            { question: "日本の新年の伝統的な行事は何ですか？ (日本的新年傳統活動是什麼？)", options: ["お盆","七夕","正月","花見"], answer:"正月" }
        ];

        const quizContainer = document.getElementById('quiz');
        const progressContainer = document.getElementById('progress');
        const resultContainer = document.getElementById('result');
        const summaryContainer = document.getElementById('summary');
        const submitButton = document.getElementById('submit');
        const restartButton = document.getElementById('restart');
        const replayButton = document.getElementById('replay');

        let currentQuestionIndex = 0;
        let score = 0;
        const userAnswers = [];

        // Web Speech API helpers
        let voices = [];
        function loadVoices() {
            voices = speechSynthesis.getVoices() || [];
        }
        // load voices initially and also onvoiceschanged
        loadVoices();
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function speakText(text, lang='ja-JP', rate=1) {
            if (!('speechSynthesis' in window)) return;
            // stop any current speech
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = lang;
            utter.rate = rate;
            // select a voice that best matches the language if available
            const voice = voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ja')) ||
                          voices.find(v => v.lang && v.lang.toLowerCase().startsWith('ja-jp')) ||
                          voices[0];
            if (voice) utter.voice = voice;
            window.speechSynthesis.speak(utter);
            return utter;
        }

        function stopSpeaking() {
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        function buildQuiz() {
            const q = questions[currentQuestionIndex];
            const optionsHtml = q.options.map((opt, idx) => {
                // include a small play control for each option
                return `<li data-answer="${escapeHtml(opt)}" data-idx="${idx}">
                          <span class="opt-text">${escapeHtml(opt)}</span>
                          <span class="play-icon" title="播放語音" data-idx="${idx}">
                            <i class="fas fa-volume-up"></i>
                          </span>
                        </li>`;
            }).join('');
            quizContainer.innerHTML = `<div class="question"><p>${escapeHtml(q.question)}</p></div>
                                       <ul class="options">${optionsHtml}</ul>`;
            updateProgress();
            attachOptionListeners();
            // auto speak question and options sequentially
            autoSpeakCurrent();
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function updateProgress() {
            progressContainer.textContent = `問題 ${currentQuestionIndex + 1} / ${questions.length} | 現在的得分: ${score}`;
        }

        function attachOptionListeners() {
            const optionEls = quizContainer.querySelectorAll('.options li');
            optionEls.forEach(li => {
                li.addEventListener('click', (e) => {
                    // ignore clicks on the play-icon (they have own handler)
                    if (e.target && e.target.classList.contains('play-icon')) return;
                    if (e.target && e.target.parentElement.classList.contains('play-icon')) return;
                    optionEls.forEach(item => item.classList.remove('selected'));
                    li.classList.add('selected');
                    const answer = li.getAttribute('data-answer');
                    userAnswers[currentQuestionIndex] = answer;
                    // speak the selected option in Japanese
                    speakText(normalizeForSpeech(answer));
                });
                const playBtn = li.querySelector('.play-icon');
                if (playBtn) {
                    playBtn.addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        const idx = playBtn.getAttribute('data-idx');
                        const text = questions[currentQuestionIndex].options[Number(idx)];
                        speakText(normalizeForSpeech(text));
                    });
                }
            });
        }

        // normalize text for better Japanese TTS (e.g., convert some Chinese/kana mix if needed)
        function normalizeForSpeech(text) {
            return text;
        }

        // Read question and each option sequentially with small delays
        async function autoSpeakCurrent() {
            if (!('speechSynthesis' in window)) return;
            stopSpeaking();
            const q = questions[currentQuestionIndex];
            // speak the question first
            speakText(q.question, 'ja-JP', 1);
            // after a short delay, speak options one by one
            const baseDelay = 1600;
            q.options.forEach((opt, i) => {
                setTimeout(() => {
                    speakText(opt, 'ja-JP', 1);
                }, baseDelay + i * 900);
            });
        }

        function showResult() {
            // get selected from DOM (if user didn't click but we have userAnswers stored, use that)
            const selectedEl = quizContainer.querySelector('.options li.selected');
            const selectedValue = selectedEl ? selectedEl.getAttribute('data-answer') : userAnswers[currentQuestionIndex] || null;
            userAnswers[currentQuestionIndex] = selectedValue;

            if (selectedValue && selectedValue === questions[currentQuestionIndex].answer) {
                score++;
            }
            stopSpeaking();
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                buildQuiz();
            } else {
                displayFinalResults();
            }
        }

        function displayFinalResults() {
            resultContainer.innerHTML = `
                <h3 style="color: var(--primary-green); margin-bottom: 15px;">
                    <i class="fas fa-trophy"></i> 測驗完成！
                </h3>
                <p style="font-size: 1.8rem; font-weight: bold;">
                    你得分 ${score} / ${questions.length}
                </p>
                <p style="margin-top: 15px; color: #bdc3c7;">
                    ${score >= 8 ? '太棒了！你對日本文化非常了解！' : 
                      score >= 6 ? '不錯！你對日本文化有一定了解！' : 
                      '繼續努力學習日本文化吧！'}
                </p>
            `;
            quizContainer.style.display = 'none';
            submitButton.style.display = 'none';
            replayButton.style.display = 'none';
            restartButton.style.display = 'inline-block';
            progressContainer.style.display = 'none';

            let summaryHtml = '<h2>結果摘要</h2><ul>';
            questions.forEach((q, idx) => {
                const ua = userAnswers[idx] || '未選擇';
                const isCorrect = ua === q.answer;
                const statusClass = isCorrect ? 'correct' : 'incorrect';
                summaryHtml += `<li class="${statusClass}">
                                <strong>問題 ${idx+1}:</strong> ${escapeHtml(q.question)}<br><br>
                                <span style="color: ${isCorrect ? 'var(--primary-green)' : 'var(--primary-red)'};">
                                    <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                                    你回答: ${escapeHtml(ua)}
                                </span><br>
                                <span style="color: var(--primary-blue);">
                                    <i class="fas fa-lightbulb"></i>
                                    正確答案: ${escapeHtml(q.answer)}
                                </span>
                                <div style="margin-top: 10px; color: #bdc3c7; font-size: 0.9rem;">
                                    ${isCorrect ? '✓ 正確' : '✗ 錯誤'}
                                </div>
                            </li>`;
            });
            summaryHtml += '</ul>';
            summaryContainer.innerHTML = summaryHtml;
            // read out final score in Japanese briefly
            speakText(`あなたのスコアは ${score} 点です。`, 'ja-JP', 1);
        }

        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            userAnswers.length = 0;
            quizContainer.style.display = 'block';
            submitButton.style.display = 'inline-block';
            replayButton.style.display = 'inline-block';
            restartButton.style.display = 'none';
            resultContainer.innerHTML = '';
            summaryContainer.innerHTML = '';
            progressContainer.style.display = 'block';
            buildQuiz();
        }

        // replay current question speech
        function replayCurrentSpeech() {
            autoSpeakCurrent();
        }

        // wire buttons
        submitButton.addEventListener('click', showResult);
        restartButton.addEventListener('click', () => {
            window.location.href = 'index.html';
        });
        replayButton.addEventListener('click', () => { 
            stopSpeaking(); 
            replayCurrentSpeech(); 
        });

        // 導航連結互動效果
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
            });
            
            link.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });

        // initialize
        buildQuiz();

        // Stop speech when user navigates away or closes
        window.addEventListener('beforeunload', () => { stopSpeaking(); });
    </script>
</body>
</html>
